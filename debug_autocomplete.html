<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Debug Autocompletado</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 50px;
        }
        .search-container {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid #333;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30, 30, 35, 0.98);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 8px;
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .suggestion-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .suggestion-item:hover {
            background: rgba(231, 76, 60, 0.3);
        }
        .suggestion-img {
            width: 40px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 12px;
            background: rgba(255,255,255,0.1);
        }
        .debug-info {
            background: #333;
            padding: 10px;
            margin-top: 20px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h2>Prueba de Autocompletado</h2>
    
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Escribe 'n' o 'naruto'..." onkeyup="handleSearchInput(event)" autocomplete="off">
        <div id="searchSuggestions" class="search-suggestions"></div>
    </div>
    
    <div class="debug-info" id="debugInfo">Debug info aparecerá aquí...</div>

    <script>
        // Datos de prueba
        const testItems = [
            {name: "Naruto (2002)", year: 2002, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Naruto Shippuden (2007)", year: 2007, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Boruto: Naruto Next Generations (2017)", year: 2017, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Attack on Titan (2013)", year: 2013, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Death Note (2006)", year: 2006, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
        ];

        let selectedSuggestionIndex = -1;

        function handleSearchInput(event) {
            const input = document.getElementById('searchInput');
            const suggestionsDiv = document.getElementById('searchSuggestions');
            const debugDiv = document.getElementById('debugInfo');
            const searchTerm = input.value.toLowerCase().trim();
            
            debugDiv.innerHTML = `Tecla: ${event.key}<br>Busqueda: "${searchTerm}"<br>Longitud: ${searchTerm.length}`;
            
            if (event.key === 'Enter') {
                debugDiv.innerHTML += '<br>Enter presionado';
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            if (event.key === 'ArrowDown' || event.key === 'ArrowUp' || event.key === 'Escape') {
                debugDiv.innerHTML += '<br>Flecha/Escape presionada';
                return;
            }
            
            if (searchTerm.length < 1) {
                suggestionsDiv.style.display = 'none';
                debugDiv.innerHTML += '<br>Texto muy corto';
                return;
            }
            
            const matches = testItems.filter(item => {
                const name = (item.name || '').toLowerCase();
                return name.includes(searchTerm);
            }).slice(0, 5);
            
            debugDiv.innerHTML += `<br>Coincidencias: ${matches.length}`;
            
            if (matches.length === 0) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            let html = '';
            matches.forEach((item, index) => {
                html += `<div class="suggestion-item" onclick="alert('Seleccionado: ${item.name}')">
                    <img src="${item.imagen_url}" class="suggestion-img" alt="">
                    <div>${item.name}</div>
                </div>`;
            });
            
            suggestionsDiv.innerHTML = html;
            suggestionsDiv.style.display = 'block';
            
            debugDiv.innerHTML += '<br>Dropdown mostrado!';
        }
        
        document.addEventListener('click', function(event) {
            const container = document.querySelector('.search-container');
            const suggestionsDiv = document.getElementById('searchSuggestions');
            if (!container.contains(event.target)) {
                suggestionsDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
