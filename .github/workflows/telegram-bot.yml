name: ForoActivo to Telegram Bot

on:
  schedule:
    # Ejecuta cada 10 minutos (UTC)
    - cron: "*/10 * * * *"
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

permissions:
  contents: write # Necesario para commit/push seen_topics.json

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests python-dotenv beautifulsoup4 lxml

      - name: Configure git credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run the bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          FORO_USERNAME: ${{ secrets.FORO_USERNAME }}
          FORO_PASSWORD: ${{ secrets.FORO_PASSWORD }}
        run: |
          cd telegram_bot
          python foroactivo_to_telegram.py

      - name: Commit and push updated seen_topics.json
        run: |
          git add telegram_bot/seen_topics.json || true
          git status
          git commit -m "🤖 Update seen_topics.json" || true
          git push || true
