name: Actualización Automática de Anime

on:
  schedule:
    # Ejecutar todos los días a las 3:00 AM UTC
    - cron: '0 3 * * *'
  # Permitir ejecución manual
  workflow_dispatch:

jobs:
  actualizar-anime:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4
      
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 schedule
        
    - name: Ejecutar actualización automática
      env:
        TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      run: python actualizacion_automatica_tmdb.py
      
    - name: Verificar cambios
      id: verify-changes
      run: |
        if git diff --quiet; then
          echo "No hay cambios"
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "Hay cambios para commitear"
          echo "changes=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit y push si hay cambios
      if: steps.verify-changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add TOP.json
        git commit -m "🤖 Actualización automática de anime con TMDB - $(date +%Y-%m-%d)"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
