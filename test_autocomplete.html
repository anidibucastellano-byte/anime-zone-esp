<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Autocompletado</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial;
            padding: 50px;
        }
        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid #333;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
        }
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30, 30, 35, 0.98);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 8px;
            margin-top: 5px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .suggestion-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .suggestion-item:hover {
            background: rgba(231, 76, 60, 0.2);
        }
        .suggestion-img {
            width: 40px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 12px;
            background: rgba(255, 255, 255, 0.1);
        }
        .suggestion-title {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Escribe 'naruto'..." onkeyup="handleSearch(event)">
        <div id="searchSuggestions" class="search-suggestions"></div>
    </div>

    <script>
        // Datos de prueba
        const testItems = [
            {name: "Naruto (2002)", year: 2002, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Naruto Shippuden (2007)", year: 2007, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Boruto: Naruto Next Generations (2017)", year: 2017, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Attack on Titan (2013)", year: 2013, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Death Note (2006)", year: 2006, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "One Piece (1999)", year: 1999, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Dragon Ball Z (1989)", year: 1989, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
            {name: "Demon Slayer (2019)", year: 2019, type: "anime", imagen_url: "https://via.placeholder.com/40x60"},
        ];

        function handleSearch(event) {
            const input = document.getElementById('searchInput');
            const suggestionsDiv = document.getElementById('searchSuggestions');
            const searchTerm = input.value.toLowerCase().trim();
            
            console.log('Typing:', searchTerm);
            
            if (searchTerm.length < 2) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            const matches = testItems.filter(item => 
                item.name.toLowerCase().includes(searchTerm)
            ).slice(0, 5);
            
            console.log('Matches:', matches.length);
            
            if (matches.length === 0) {
                suggestionsDiv.style.display = 'none';
                return;
            }
            
            let html = '';
            matches.forEach(item => {
                html += `<div class="suggestion-item" onclick="alert('Seleccionado: ${item.name}')">
                    <img src="${item.imagen_url}" class="suggestion-img" alt="">
                    <div class="suggestion-title">${item.name}</div>
                </div>`;
            });
            
            suggestionsDiv.innerHTML = html;
            suggestionsDiv.style.display = 'block';
        }
        
        // Cerrar al hacer clic fuera
        document.addEventListener('click', function(event) {
            const container = document.querySelector('.search-container');
            const suggestionsDiv = document.getElementById('searchSuggestions');
            if (!container.contains(event.target)) {
                suggestionsDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
